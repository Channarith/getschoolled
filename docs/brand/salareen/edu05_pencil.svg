<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Salareen">
  <circle cx="128" cy="128" r="106" stroke-width="11" stroke="currentColor" fill="none"/>
  <path d="M 174 96
           C 174 80, 154 70, 128 70
           C 102 70, 86 82, 86 100
           C 86 118, 108 124, 128 130
           C 148 136, 170 142, 170 162
           C 170 180, 152 192, 128 192
           C 106 192, 88 184, 84 172"
        stroke-width="22" stroke="currentColor" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pencil group, rotated -25 deg about (128,128) so it cuts the S
       from lower-left to upper-right -->
  <g transform="rotate(-25 128 128)">
    <g fill="currentColor">
      <!-- Eraser (rounded end) -->
      <rect x="44" y="120" width="18" height="16" rx="3"/>
      <!-- Ferrule (metal band) -->
      <rect x="62" y="120" width="6" height="16"/>
      <!-- Body -->
      <rect x="68" y="120" width="130" height="16"/>
      <!-- Wooden tip -->
      <path d="M 198 120 L 218 128 L 198 136 Z"/>
      <!-- Lead -->
      <path d="M 216 126 L 222 128 L 216 130 Z"/>
    </g>
  </g>
</svg>