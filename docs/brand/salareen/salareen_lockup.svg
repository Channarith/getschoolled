<?xml version="1.0" encoding="UTF-8"?>
<!--
  Salareen lockup - mark + Khmer wordmark "សាលារៀន" (sala-rian,
  literally "school") below. The mark is centered in the top 256x256
  square; the wordmark sits centered below, in Noto Sans Khmer Bold.
  Browsers + Figma + Illustrator render the Khmer correctly via HarfBuzz;
  rasterized PNG exports come from scripts/build_salareen_concepts.py
  which uses Pillow+raqm for the text and rsvg-convert for the mark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 340" role="img"
     aria-label="Salareen សាលារៀន">
  <g transform="translate(0,0)">
    <use href="#mark"/>
  </g>
  <defs>
    <g id="mark">
      <g fill="currentColor" fill-rule="evenodd">
        <path d="M 96 56 C 84 38, 64 38, 60 50 C 56 64, 70 76, 88 74 C 100 72, 104 64, 102 58 Z"/>
        <path d="M 160 56 C 172 38, 192 38, 196 50 C 200 64, 186 76, 168 74 C 156 72, 152 64, 154 58 Z"/>
        <path d="M 128 16 C 116 38, 108 56, 110 68 C 116 82, 140 82, 146 68 C 148 56, 140 38, 128 16 Z"/>
      </g>
      <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 128 92 C 92 92, 66 102, 66 122 C 66 142, 96 150, 128 156 C 160 162, 192 170, 192 192 C 192 214, 166 228, 128 228 C 94 228, 68 218, 62 200" stroke-width="22"/>
        <path d="M 128 92 C 148 88, 158 76, 152 66 C 146 58, 132 62, 130 76" stroke-width="14"/>
      </g>
    </g>
  </defs>
  <text x="128" y="312" text-anchor="middle" fill="currentColor"
        font-family="Noto Sans Khmer, Khmer OS, Khmer, sans-serif"
        font-size="48" font-weight="700"
        xml:lang="km">សាលារៀន</text>
</svg>
