<?xml version="1.0" encoding="UTF-8"?>
<!--
  Salareen logo - final mark.

  A calligraphic capital S whose top swan-neck curl rises into the
  central petal of a stylized 3-petal lotus crown. The crown grows out
  of the curl; the two motifs read as a single silhouette. Single ink,
  themable via currentColor (light on dark or dark on light by setting
  CSS color on the parent).

  Companion: salareen_lockup.svg adds the Khmer wordmark below.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img"
     aria-label="Salareen">

  <g fill="currentColor" fill-rule="evenodd">
    <!-- Side petals: tapered leaves tilted up-and-outward.
         Each is one closed path drawn as two arcs meeting at a tip. -->
    <path d="M 110 88
             C 96 80, 78 64, 64 52
             C 56 62, 56 80, 70 90
             C 84 100, 102 100, 110 96
             Z"/>
    <path d="M 146 88
             C 160 80, 178 64, 192 52
             C 200 62, 200 80, 186 90
             C 172 100, 154 100, 146 96
             Z"/>

    <!-- Central petal: tall pointed teardrop, sits over the S top,
         hides the bulk of the curl (the curl visible at the bottom
         of this petal reads as the lotus stamen). -->
    <path d="M 128 14
             C 108 50, 96 78, 102 98
             C 112 114, 144 114, 154 98
             C 160 78, 148 50, 128 14
             Z"/>
  </g>

  <!-- S body + SA-hook curl. The curl loops inside the central petal
       above; only its lower terminus is visible below the petal,
       reading as the connection point between S and crown. -->
  <g fill="none" stroke="currentColor"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- Main S bowl -->
    <path d="M 128 112
             C 92 112, 66 122, 66 142
             C 66 162, 96 170, 128 176
             C 160 182, 192 190, 192 212
             C 192 230, 168 244, 132 244
             C 98 244, 72 234, 64 218"
          stroke-width="22"/>
    <!-- Inner swan-hook curl that lives inside the central petal -->
    <path d="M 128 112
             C 148 104, 150 86, 138 80
             C 126 76, 116 86, 122 96"
          stroke-width="14"/>
  </g>
</svg>
