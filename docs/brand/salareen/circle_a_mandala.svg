<?xml version="1.0" encoding="UTF-8"?>
<!--
  Salareen circle concept A - "Lotus mandala".
  A circular ring with a top-down 5-petal lotus inside. Mandala
  symmetry, single ink, instantly readable as "lotus / wisdom seat",
  the universal Khmer/Sanskrit temple motif.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img"
     aria-label="Salareen">
  <g fill="none" stroke="currentColor" stroke-width="14"
     stroke-linecap="round" stroke-linejoin="round">
    <circle cx="128" cy="128" r="106"/>
  </g>
  <g fill="currentColor" transform="translate(128 128)">
    <!-- 5 petals at 0, 72, 144, 216, 288 degrees -->
    <g>
      <path d="M 0 -68 C -14 -50, -14 -28, 0 -10 C 14 -28, 14 -50, 0 -68 Z"/>
    </g>
    <g transform="rotate(72)">
      <path d="M 0 -68 C -14 -50, -14 -28, 0 -10 C 14 -28, 14 -50, 0 -68 Z"/>
    </g>
    <g transform="rotate(144)">
      <path d="M 0 -68 C -14 -50, -14 -28, 0 -10 C 14 -28, 14 -50, 0 -68 Z"/>
    </g>
    <g transform="rotate(216)">
      <path d="M 0 -68 C -14 -50, -14 -28, 0 -10 C 14 -28, 14 -50, 0 -68 Z"/>
    </g>
    <g transform="rotate(288)">
      <path d="M 0 -68 C -14 -50, -14 -28, 0 -10 C 14 -28, 14 -50, 0 -68 Z"/>
    </g>
    <!-- Center bindu / pistil dot -->
    <circle cx="0" cy="0" r="10"/>
  </g>
</svg>
