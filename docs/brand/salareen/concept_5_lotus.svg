<?xml version="1.0" encoding="UTF-8"?>
<!--
  Salareen logo concept 5 - "Lotus crown".

  An S inside a hand-drawn mandala circle, with a small stylized 3-petal
  lotus crown sitting cleanly on top, and a bindu dot below. The crown
  nods to lotus iconography common in Sanskrit / Khmer temple art (Bayon,
  Borobudur) without copying any religious symbol. Single colour, more
  ornamental than the other four.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img"
     aria-label="Salareen">
  <g fill="none" stroke="currentColor" stroke-width="12"
     stroke-linecap="round" stroke-linejoin="round">
    <circle cx="128" cy="148" r="86"/>
    <path d="M 168 124
             C 168 110, 150 102, 128 102
             C 106 102, 90 112, 90 126
             C 90 142, 110 148, 128 152
             C 146 156, 168 160, 168 178
             C 168 194, 150 202, 128 202
             C 110 202, 94 198, 88 188"/>
  </g>
  <g fill="currentColor">
    <path d="M 128 30
             C 128 30, 122 50, 110 56
             C 122 58, 128 62, 128 62
             C 128 62, 134 58, 146 56
             C 134 50, 128 30, 128 30 Z"/>
    <path d="M 110 56
             C 100 50, 92 56, 92 64
             C 92 70, 100 72, 110 70
             C 116 68, 116 60, 110 56 Z"/>
    <path d="M 146 56
             C 156 50, 164 56, 164 64
             C 164 70, 156 72, 146 70
             C 140 68, 140 60, 146 56 Z"/>
    <circle cx="128" cy="234" r="5"/>
  </g>
</svg>
