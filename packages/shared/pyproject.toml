[build-system]
requires = ["setuptools>=69.5.1", "wheel>=0.43.0"]
build-backend = "setuptools.build_meta"

[project]
name = "eduplatform-shared"
version = "0.1.0"
description = "Shared provider interfaces, local/cloud implementations, config factory, and schemas for the Agentic Online Education Platform."
requires-python = ">=3.11"
dependencies = [
    "pydantic==2.7.4",
    "pydantic-settings==2.3.4",
]

[project.optional-dependencies]
test = [
    "pytest==8.2.2",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
