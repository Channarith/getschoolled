[build-system]
requires = ["setuptools>=69.5.1", "wheel>=0.43.0"]
build-backend = "setuptools.build_meta"

[project]
name = "aoep-shared"
version = "0.2.0"
description = "Shared provider interfaces, local/cloud implementations, config factory, schemas, RAG, adaptive learning, assessment, and vision for the Agentic Online Education Platform."
license = { text = "LicenseRef-AOEP-Proprietary" }
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7,<3",
    # numpy backs the harvester course-composition matrix/scoring (and foresight).
    "numpy>=1.26,<3",
]

[project.optional-dependencies]
test = [
    "pytest==8.2.2",
    # Harvest export is exercised in CI; keep pptx on the test extra so
    # `pip install -e packages/shared[test]` works without [harvest].
    "python-pptx==0.6.23",
]
# Self-hosted face recognition (perception service). Heavy/optional; not pulled
# in by services that don't need vision.
vision = [
    "opencv-contrib-python-headless==4.10.0.84",
    "onnxruntime==1.18.1",
    "numpy==1.26.4",
]
# Harvester binary-source extractors (PowerPoint / Word). Lazy-imported; only
# required when generating a course from .pptx / .docx files.
harvest = [
    "pypdf==4.2.0",
    "beautifulsoup4==4.12.3",
    "python-pptx==0.6.23",
    "python-docx==1.1.2",
]
presenter = [
    "edge-tts==6.1.12",
    "pymupdf==1.24.9",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"aoep_shared.training_agents" = ["data/*.json"]
"aoep_shared" = [
    "data/content_packs/*/*.json",
    "data/content_packs/*/*.jsonl",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
