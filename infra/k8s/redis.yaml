# Redis StatefulSet - DURABLE identity/session store + rate-limit + cache.
#
# IMPORTANT: identity (accounts, points/rewards ledgers, student profiles,
# onboarding-survey completion) snapshots its whole state into Redis (see
# services/identity/.../persistence.py). That makes Redis a system of record,
# NOT a regeneratable cache. So this StatefulSet is configured for durability:
#
#   * volumeClaimTemplates -> a PersistentVolume mounted at /data, so data
#     survives pod restarts, node moves, and rollouts. (Without it, every
#     Redis restart wiped accounts/points and re-popped the onboarding survey.)
#   * --appendonly yes (AOF, fsync every second) is the primary durability
#     mechanism; --save adds periodic RDB snapshots as a fast-restart backstop.
#   * --maxmemory-policy volatile-lru evicts ONLY keys that carry a TTL
#     (rate-limit buckets, arcade game rounds) under memory pressure and NEVER
#     the identity snapshot (which has no TTL). allkeys-lru could silently
#     evict the identity key, so it must not be used here.
#
# Production should still consider a managed Redis (Vultr Managed / ElastiCache /
# MemoryStore / Upstash) or a Sentinel HA pair so a single node failure doesn't
# burst-load every backend. The aoep_shared.ratelimit module falls back to
# per-replica memory if Redis is briefly unreachable, so a blip degrades
# rate-limit consistency but doesn't cause user-facing 5xx.
#
# No storageClassName is set, so each cluster's DEFAULT StorageClass is used
# (e.g. vultr-block-storage on VKE), matching infra/k8s-vke/pvc-vke.yaml.
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: aoep }
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379, name: redis }]
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: redis, namespace: aoep }
spec:
  serviceName: redis
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        # redis:alpine runs as uid 999; let it own the mounted volume.
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7.4-alpine
          args:
            - redis-server
            - --dir
            - /data
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --save
            - "900 1 300 10 60 10000"
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - volatile-lru
          ports: [{ containerPort: 6379, name: redis }]
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 384Mi }
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 20
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata: { name: redis-data, namespace: aoep }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
