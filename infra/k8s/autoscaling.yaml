# Horizontal Pod Autoscalers + PodDisruptionBudgets for every API service.
#
# - HPA scales between minReplicas/maxReplicas based on CPU + memory util.
#   minReplicas: 3 ensures one AZ outage still leaves a working pair.
#   maxReplicas: 30 caps the cost. Tune per-service once real traffic
#   patterns are observed (the curriculum service is read-heavy and tends
#   to need more replicas at peak; billing barely uses any).
#
# - behavior.scaleDown is conservative (5 min stabilization, max 50% per
#   60s) so a spike that briefly drops can't cause a scale-down storm.
#   scaleUp is aggressive (15s stabilization, double the pods or +4 per
#   30s) so traffic surges get absorbed.
#
# - PodDisruptionBudget guarantees at least 2/3 of replicas are healthy
#   during voluntary disruptions (node drains, autoscaler down-scales,
#   cluster upgrades). N-1 availability under any drain.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: orchestrator, namespace: aoep }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: orchestrator }
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource: { name: cpu,    target: { type: Utilization, averageUtilization: 60 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 75 } }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies: [{ type: Percent, value: 50, periodSeconds: 60 }]
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - { type: Percent, value: 100, periodSeconds: 30 }
        - { type: Pods,    value: 4,   periodSeconds: 30 }
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: orchestrator, namespace: aoep }
spec:
  minAvailable: 2
  selector: { matchLabels: { app: orchestrator } }
---
