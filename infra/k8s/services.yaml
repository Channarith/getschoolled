# Stateless Python services. Each loads config from the shared ConfigMap +
# Secret (envFrom), so the local/cloud split is config-only -- no image forks.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: aoep
spec:
  replicas: 2
  selector:
    matchLabels: { app: orchestrator }
  template:
    metadata:
      labels: { app: orchestrator }
    spec:
      containers:
        - name: orchestrator
          image: ghcr.io/aoep/orchestrator:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: aoep-config }
            - secretRef: { name: aoep-secrets }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: aoep
spec:
  selector: { app: orchestrator }
  ports: [{ port: 8000, targetPort: 8000 }]
