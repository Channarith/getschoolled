# Stateless Python services. Each loads config from the shared ConfigMap +
# Secret (envFrom), so the local/cloud split is config-only -- no image forks.
#
# Production scaling defaults (every Deployment below):
#   * minReplicas: 3 across at least 2 AZs (anti-affinity below). HA at one
#     replica down for rolling deploys, one node-AZ outage still leaves a
#     working pair.
#   * resources.requests/limits set so the HPA has signal and one runaway
#     pod can't OOM neighbours.
#   * topologySpreadConstraints + podAntiAffinity push replicas onto
#     different nodes / AZs so a single AZ failure can't take a service
#     fully offline.
#   * preStop sleep + terminationGracePeriodSeconds gives the in-flight
#     request the time to drain through the load balancer before SIGKILL.
#   * readinessProbe is what cuts traffic during rolling deploys; the
#     livenessProbe is intentionally lenient so a slow GC doesn't trigger
#     a restart loop under load.
#   * HPA scales on CPU + memory; PDB protects N-1 during voluntary
#     disruptions (node drains, autoscaler down-scales).
#
# A backing Redis (rate-limit + cache + sessions) StatefulSet is in
# redis.yaml, an Ingress with TLS termination + WAF in ingress.yaml, and
# the HPAs / PDBs in autoscaling.yaml.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: aoep
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 25%, maxUnavailable: 0 }
  selector: { matchLabels: { app: orchestrator } }
  template:
    metadata:
      labels: { app: orchestrator, tier: api }
    spec:
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: topology.kubernetes.io/zone
                labelSelector: { matchLabels: { app: orchestrator } }
            - weight: 50
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector: { matchLabels: { app: orchestrator } }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: { matchLabels: { app: orchestrator } }
      containers:
        - name: orchestrator
          image: ghcr.io/aoep/orchestrator:latest
          # Mutable :latest tag -> always re-pull so a rollout picks up new code
          # (IfNotPresent would keep a stale node-cached image).
          imagePullPolicy: Always
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: aoep-config }
            - secretRef: { name: aoep-secrets }
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits:   { cpu: "1",  memory: 1Gi }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 2
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 6
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec: { command: ["sh", "-c", "sleep 10"] }
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: aoep
  annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8000" }
spec:
  selector: { app: orchestrator }
  ports: [{ port: 8000, targetPort: 8000 }]
---
