# Single-origin (hostless) routing so the cluster works over a bare LoadBalancer
# IP or a single domain - no separate app/api subdomains or DNS required.
#
# The web bundle reaches every backend through a same-origin path prefix
# (apps/web/app/lib/api.ts): /orchestrator/..., /identity/..., /curriculum/...,
# etc. These two Ingresses (no `host:`, so they match any host incl. the bare
# IP) serve the web app at "/" and rewrite each /<svc>/... prefix to the service.
#
# Kept separate from the host-based aoep / aoep-apis Ingresses (which still serve
# app.aoep.example / api.aoep.example when DNS + TLS exist). The prefixed routes
# need rewrite-target, the web route must not - hence two objects.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aoep-origin-web
  namespace: aoep
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    # Orchestrator keeps live-class sessions in memory; pin each client to one
    # backend pod so /api/sessions/{id}/advance|ask don't 404 across replicas.
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "salareen_aff"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
    nginx.ingress.kubernetes.io/session-cookie-path: "/"
    nginx.ingress.kubernetes.io/limit-rps: "60"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "200"
    nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout http_502 http_503"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "5"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: web, port: { number: 80 } } }
---
# /<svc>/... -> <svc>/... (prefix stripped). Separate object because
# rewrite-target applies to the whole Ingress and the web route must not rewrite.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aoep-origin-apis
  namespace: aoep
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "salareen_aff"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
    nginx.ingress.kubernetes.io/session-cookie-path: "/"
    nginx.ingress.kubernetes.io/limit-rps: "60"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /orchestrator(/|$)(.*)
            pathType: ImplementationSpecific
            backend: { service: { name: orchestrator, port: { number: 8000 } } }
          - path: /identity(/|$)(.*)
            pathType: ImplementationSpecific
            backend: { service: { name: identity, port: { number: 8000 } } }
          - path: /curriculum(/|$)(.*)
            pathType: ImplementationSpecific
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          - path: /integrations(/|$)(.*)
            pathType: ImplementationSpecific
            backend: { service: { name: integrations, port: { number: 8000 } } }
          - path: /memory(/|$)(.*)
            pathType: ImplementationSpecific
            backend: { service: { name: memory, port: { number: 8000 } } }
          - path: /speech(/|$)(.*)
            pathType: ImplementationSpecific
            backend: { service: { name: speech, port: { number: 8000 } } }
          - path: /billing(/|$)(.*)
            pathType: ImplementationSpecific
            backend: { service: { name: billing, port: { number: 8000 } } }
          - path: /perception(/|$)(.*)
            pathType: ImplementationSpecific
            backend: { service: { name: perception, port: { number: 8000 } } }
