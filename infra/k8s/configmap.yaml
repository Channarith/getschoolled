# Non-secret cloud configuration. Secrets (LIVEKIT_API_SECRET, PAYMENT_API_KEY,
# DB password, object-store keys) come from a separate Secret, not this file.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aoep-config
  namespace: aoep
data:
  DEPLOY_MODE: "cloud"
  LLM_BASE_URL: "http://llm:8000/v1"
  LLM_MODEL: "aoep-base-edu"
  # In-cluster service-to-service URLs (every service listens on :8000 and is
  # addressed by its Service name).
  SPEECH_BASE_URL: "http://speech:8000"
  VISION_BASE_URL: "http://perception:8000"
  LIVEKIT_URL: "wss://livekit.aoep.example"
  OBJECT_STORE_ENDPOINT: "https://s3.amazonaws.com"
  OBJECT_STORE_BUCKET: "aoep-prod"
  REDIS_URL: "redis://redis.aoep.internal:6379/0"
  CURRICULUM_DIR: "/app/sample-curriculum"
  # Default admin seeding (identity service). The identity store is in-memory, so
  # it re-seeds this admin on every (re)start, making the platform usable out of
  # the box. SEED_DEFAULT_ADMIN=0 disables it. The PASSWORD lives in the Secret
  # (aoep-secrets/DEFAULT_ADMIN_PASSWORD) - rotate it for any real deployment.
  SEED_DEFAULT_ADMIN: "1"
  DEFAULT_ADMIN_EMAIL: "admin@salareen.com"
  DEFAULT_ADMIN_USERNAME: "admin"
  # Careers: serve REAL job openings from public boards (Remotive + Arbeitnow;
  # no key, falls back to the curated board if egress is blocked). Add a
  # RAPIDAPI_KEY (JSearch -> LinkedIn/Indeed/Glassdoor) or ADZUNA_APP_ID/KEY via
  # the Secret to index those sources too.
  JOBS_LIVE: "1"
  ORCHESTRATOR_URL: "https://api.aoep.example"
  # Browser-facing API bases for the web app. By DEFAULT the web bundle derives
  # these from the page origin + a same-origin path prefix (apps/web/app/lib/api.ts),
  # which the Ingress rewrites to each Service - so the values below are RELATIVE
  # prefixes and work on a bare LB IP or any domain with no DNS for api/app
  # subdomains. They are only needed if you want to pin the web image to absolute
  # cross-origin API hosts (Next.js inlines NEXT_PUBLIC_* at BUILD time, so they
  # must be passed as build args to take effect; left as relative defaults, the
  # browser's same-origin resolution already works without any build args).
  NEXT_PUBLIC_ORCHESTRATOR_URL: "/orchestrator"
  NEXT_PUBLIC_CURRICULUM_URL: "/curriculum"
  NEXT_PUBLIC_IDENTITY_URL: "/identity"
  NEXT_PUBLIC_MEMORY_URL: "/memory"
  NEXT_PUBLIC_SPEECH_URL: "/speech"
  NEXT_PUBLIC_BILLING_URL: "/billing"
  NEXT_PUBLIC_INTEGRATIONS_URL: "/integrations"
  NEXT_PUBLIC_PERCEPTION_URL: "/perception"
  # Mobile app download targets for the /download page (empty -> "Coming soon").
  # Like other NEXT_PUBLIC_*, these are inlined at web build time.
  NEXT_PUBLIC_ANDROID_APK_URL: ""
  NEXT_PUBLIC_PLAY_STORE_URL: ""
  NEXT_PUBLIC_IOS_APP_URL: ""
  NEXT_PUBLIC_APP_STORE_URL: ""
---
# Placeholder secret. Replace values via your cluster's secret manager / CI.
apiVersion: v1
kind: Secret
metadata:
  name: aoep-secrets
  namespace: aoep
type: Opaque
stringData:
  LIVEKIT_API_KEY: "__INJECT__"
  LIVEKIT_API_SECRET: "__INJECT__"
  OBJECT_STORE_ACCESS_KEY: "__INJECT__"
  OBJECT_STORE_SECRET_KEY: "__INJECT__"
  DATABASE_URL: "postgresql://aoep:__INJECT__@postgres.aoep.internal:5432/aoep"
  PAYMENT_API_KEY: "__INJECT__"
  # Seed password for the default admin (identity). Demo default; ROTATE for prod
  # (or set SEED_DEFAULT_ADMIN=0 in the ConfigMap and create the admin manually).
  DEFAULT_ADMIN_PASSWORD: "88888888"
