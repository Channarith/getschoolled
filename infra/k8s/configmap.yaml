# Non-secret cloud configuration. Secrets (LIVEKIT_API_SECRET, PAYMENT_API_KEY,
# DB password, object-store keys) come from a separate Secret, not this file.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aoep-config
  namespace: aoep
data:
  DEPLOY_MODE: "cloud"
  LLM_BASE_URL: "http://llm:8000/v1"
  LLM_MODEL: "aoep-base-edu"
  # In-cluster service-to-service URLs (every service listens on :8000 and is
  # addressed by its Service name).
  SPEECH_BASE_URL: "http://speech:8000"
  VISION_BASE_URL: "http://perception:8000"
  LIVEKIT_URL: "wss://livekit.aoep.example"
  OBJECT_STORE_ENDPOINT: "https://s3.amazonaws.com"
  OBJECT_STORE_BUCKET: "aoep-prod"
  REDIS_URL: "redis://redis.aoep.internal:6379/0"
  CURRICULUM_DIR: "/app/sample-curriculum"
  ORCHESTRATOR_URL: "https://api.aoep.example"
  # Browser-facing API bases for the web app. The Ingress routes each /<svc>/
  # path prefix to the matching Service (see ingress.yaml). NOTE: Next.js inlines
  # NEXT_PUBLIC_* at BUILD time, so the web image must be built with these values
  # (pass as build args) for the browser bundle to use them; this ConfigMap
  # documents the contract and covers any runtime-config shim.
  NEXT_PUBLIC_ORCHESTRATOR_URL: "https://api.aoep.example"
  NEXT_PUBLIC_CURRICULUM_URL: "https://api.aoep.example/curriculum"
  NEXT_PUBLIC_IDENTITY_URL: "https://api.aoep.example/identity"
  NEXT_PUBLIC_MEMORY_URL: "https://api.aoep.example/memory"
  NEXT_PUBLIC_SPEECH_URL: "https://api.aoep.example/speech"
  NEXT_PUBLIC_BILLING_URL: "https://api.aoep.example/billing"
  NEXT_PUBLIC_INTEGRATIONS_URL: "https://api.aoep.example/integrations"
  NEXT_PUBLIC_PERCEPTION_URL: "https://api.aoep.example/perception"
  # Mobile app download targets for the /download page (empty -> "Coming soon").
  # Like other NEXT_PUBLIC_*, these are inlined at web build time.
  NEXT_PUBLIC_ANDROID_APK_URL: ""
  NEXT_PUBLIC_PLAY_STORE_URL: ""
  NEXT_PUBLIC_IOS_APP_URL: ""
  NEXT_PUBLIC_APP_STORE_URL: ""
---
# Placeholder secret. Replace values via your cluster's secret manager / CI.
apiVersion: v1
kind: Secret
metadata:
  name: aoep-secrets
  namespace: aoep
type: Opaque
stringData:
  LIVEKIT_API_KEY: "__INJECT__"
  LIVEKIT_API_SECRET: "__INJECT__"
  OBJECT_STORE_ACCESS_KEY: "__INJECT__"
  OBJECT_STORE_SECRET_KEY: "__INJECT__"
  DATABASE_URL: "postgresql://aoep:__INJECT__@postgres.aoep.internal:5432/aoep"
  PAYMENT_API_KEY: "__INJECT__"
