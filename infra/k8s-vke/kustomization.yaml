apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: aoep
resources:
  - ../k8s
patches:
  - path: configmap-vke.yaml
  - path: ingress-vke.yaml
  - path: pvc-vke.yaml
patchesStrategicMerge:
  - ingress-vke-delete-origin.yaml
images:
  - name: ghcr.io/aoep/orchestrator
    newName: sjc.vultrcr.com/salareen/orchestrator
    newTag: latest
  - name: ghcr.io/aoep/speech
    newName: sjc.vultrcr.com/salareen/speech
    newTag: latest
  - name: ghcr.io/aoep/perception
    newName: sjc.vultrcr.com/salareen/perception
    newTag: latest
  - name: ghcr.io/aoep/memory
    newName: sjc.vultrcr.com/salareen/memory
    newTag: latest
  - name: ghcr.io/aoep/curriculum
    newName: sjc.vultrcr.com/salareen/curriculum
    newTag: latest
  - name: ghcr.io/aoep/billing
    newName: sjc.vultrcr.com/salareen/billing
    newTag: latest
  - name: ghcr.io/aoep/integrations
    newName: sjc.vultrcr.com/salareen/integrations
    newTag: latest
  - name: ghcr.io/aoep/identity
    newName: sjc.vultrcr.com/salareen/identity
    newTag: latest
  - name: ghcr.io/aoep/web
    newName: sjc.vultrcr.com/salareen/web
    newTag: latest
  - name: aoep/harvester
    newName: sjc.vultrcr.com/salareen/harvester
    newTag: latest
  - name: aoep/memory
    newName: sjc.vultrcr.com/salareen/memory
    newTag: latest
