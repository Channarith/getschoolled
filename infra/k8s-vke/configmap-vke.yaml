apiVersion: v1
kind: ConfigMap
metadata:
  name: aoep-config
  namespace: aoep
data:
  DEPLOY_MODE: "cloud"
  LLM_BASE_URL: "http://llm:8000/v1"
  LLM_MODEL: "aoep-base-edu"
  SPEECH_BASE_URL: "http://speech:8000"
  VISION_BASE_URL: "http://perception:8000"
  LIVEKIT_URL: "wss://livekit.salareen.com"
  OBJECT_STORE_ENDPOINT: "https://<vultr-region>.vultrobjects.com"
  OBJECT_STORE_BUCKET: "salareen-prod"
  REDIS_URL: "redis://redis.aoep.svc.cluster.local:6379/0"
  CURRICULUM_DIR: "/app/sample-curriculum"
  ORCHESTRATOR_URL: "https://api.salareen.com"
  # Browser-facing API bases (Ingress routes each /<svc>/ prefix to its Service).
  # NEXT_PUBLIC_* are inlined at web BUILD time, so build the web image with these.
  NEXT_PUBLIC_ORCHESTRATOR_URL: "https://api.salareen.com"
  NEXT_PUBLIC_CURRICULUM_URL: "https://api.salareen.com/curriculum"
  NEXT_PUBLIC_IDENTITY_URL: "https://api.salareen.com/identity"
  NEXT_PUBLIC_MEMORY_URL: "https://api.salareen.com/memory"
  NEXT_PUBLIC_SPEECH_URL: "https://api.salareen.com/speech"
  NEXT_PUBLIC_BILLING_URL: "https://api.salareen.com/billing"
  NEXT_PUBLIC_INTEGRATIONS_URL: "https://api.salareen.com/integrations"
  NEXT_PUBLIC_PERCEPTION_URL: "https://api.salareen.com/perception"
