apiVersion: v1
kind: ConfigMap
metadata:
  name: aoep-config
  namespace: aoep
data:
  DEPLOY_MODE: "cloud"
  LLM_BASE_URL: "http://llm:8000/v1"
  LLM_MODEL: "aoep-base-edu"
  SPEECH_BASE_URL: "http://speech:8000"
  VISION_BASE_URL: "http://perception:8000"
  LIVEKIT_URL: "wss://livekit.salareen.com"
  OBJECT_STORE_ENDPOINT: "https://<vultr-region>.vultrobjects.com"
  OBJECT_STORE_BUCKET: "salareen-prod"
  REDIS_URL: "redis://redis.aoep.svc.cluster.local:6379/0"
  CURRICULUM_DIR: "/app/sample-curriculum"
  # Default admin seeding (identity). In-memory store re-seeds on every restart so
  # admin@salareen.com is usable out of the box; SEED_DEFAULT_ADMIN=0 disables it.
  # Password is in the Secret (aoep-secrets/DEFAULT_ADMIN_PASSWORD) - rotate it.
  SEED_DEFAULT_ADMIN: "1"
  DEFAULT_ADMIN_EMAIL: "admin@salareen.com"
  DEFAULT_ADMIN_USERNAME: "admin"
  SEED_QA_ACCOUNTS: "1"
  # Careers: real job openings from public boards (free) + keyed aggregators
  # (RAPIDAPI_KEY / ADZUNA_*) for LinkedIn/Indeed-sourced listings. Falls back to
  # the curated board if the cluster has no egress.
  JOBS_LIVE: "1"
  ORCHESTRATOR_URL: "https://api.salareen.com"
  # Browser-facing API bases. Same-origin RELATIVE prefixes by default: the web
  # bundle prepends the page origin and the (hostless) Ingress rewrites each
  # /<svc>/ prefix to its Service, so this works over the bare LB IP or
  # salareen.com without separate api/app DNS. Set to absolute hosts only if you
  # intentionally serve the API on a different origin (then build the web image
  # with these as build args, since Next.js inlines NEXT_PUBLIC_* at build time).
  NEXT_PUBLIC_ORCHESTRATOR_URL: "/orchestrator"
  NEXT_PUBLIC_CURRICULUM_URL: "/curriculum"
  NEXT_PUBLIC_IDENTITY_URL: "/identity"
  NEXT_PUBLIC_MEMORY_URL: "/memory"
  NEXT_PUBLIC_SPEECH_URL: "/speech"
  NEXT_PUBLIC_BILLING_URL: "/billing"
  NEXT_PUBLIC_INTEGRATIONS_URL: "/integrations"
  NEXT_PUBLIC_PERCEPTION_URL: "/perception"
  # Shared with memory admin routes (X-Admin-Secret) for operator recovery tools.
  ADMIN_SECRET: "dev-admin-secret"
  # Mobile app download targets for /download (empty -> "Coming soon"). Set these
  # to the hosted APK + Play/App Store links once published; inlined at build.
  NEXT_PUBLIC_ANDROID_APK_URL: "https://api.salareen.com/downloads/salareen-android.apk"
  NEXT_PUBLIC_PLAY_STORE_URL: ""
  NEXT_PUBLIC_IOS_APP_URL: ""
  NEXT_PUBLIC_APP_STORE_URL: ""
