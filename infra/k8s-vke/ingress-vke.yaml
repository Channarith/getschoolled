apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aoep
  namespace: aoep
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    # Sticky sessions so live-class sessions (kept in-memory by the orchestrator)
    # don't 404 across its replicas. See infra/k8s/ingress.yaml for rationale.
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "salareen_aff"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
    nginx.ingress.kubernetes.io/session-cookie-path: "/"
    nginx.ingress.kubernetes.io/limit-rps: "60"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "200"
    nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout http_502 http_503"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "5"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [api.salareen.com, www.salareen.com, salareen.com]
      secretName: salareen-tls
  rules:
    - host: www.salareen.com
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend: { service: { name: orchestrator, port: { number: 8000 } } }
          - path: /health
            pathType: Prefix
            backend: { service: { name: orchestrator, port: { number: 8000 } } }
          - path: /home
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          - path: /audio
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          - path: /courses
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          # Careers UI (Next.js). API lives at /curriculum/jobs via aoep-apis.
          - path: /jobs
            pathType: Prefix
            backend: { service: { name: web, port: { number: 80 } } }
          - path: /notifications
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: web, port: { number: 80 } } }
    - host: salareen.com
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend: { service: { name: orchestrator, port: { number: 8000 } } }
          - path: /health
            pathType: Prefix
            backend: { service: { name: orchestrator, port: { number: 8000 } } }
          - path: /home
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          - path: /audio
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          - path: /courses
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          # Careers UI (Next.js). API lives at /curriculum/jobs via aoep-apis.
          - path: /jobs
            pathType: Prefix
            backend: { service: { name: web, port: { number: 80 } } }
          - path: /notifications
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: web, port: { number: 80 } } }
    - host: api.salareen.com
      http:
        paths:
          - path: /home
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          - path: /audio
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          - path: /courses
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          - path: /jobs
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          - path: /notifications
            pathType: Prefix
            backend: { service: { name: curriculum, port: { number: 8000 } } }
          - path: /api/
            pathType: Prefix
            backend: { service: { name: orchestrator, port: { number: 8000 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: orchestrator, port: { number: 8000 } } }
    - http:
        paths:
          - path: /api/
            pathType: Prefix
            backend: { service: { name: orchestrator, port: { number: 8000 } } }
          - path: /health
