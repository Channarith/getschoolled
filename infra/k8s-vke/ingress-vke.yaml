apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aoep
  namespace: aoep
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/limit-rps: "60"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "200"
    nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout http_502 http_503"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "5"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [api.aiclassroom.com, app.aiclassroom.com]
      secretName: aiclassroom-tls
  rules:
    - host: app.aiclassroom.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: web, port: { number: 80 } } }
    - host: api.aiclassroom.com
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend: { service: { name: orchestrator, port: { number: 8000 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: orchestrator, port: { number: 8000 } } }
