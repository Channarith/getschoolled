# Scale-test overlay for the local stack.
#
# Layers an nginx load balancer in front of N curriculum + orchestrator
# replicas so you can exercise multi-replica behaviour locally without
# Kubernetes. Use as:
#
#   docker compose -f infra/compose/docker-compose.yml \
#                  -f infra/compose/scale.yml up --build --scale curriculum=4 --scale orchestrator=3
#
# Then hit:
#   http://localhost:18000/api/...    (orchestrator behind LB)
#   http://localhost:18500/...        (curriculum behind LB)
#
# What this exercises that the single-replica compose can't:
#   * Redis-backed rate-limiter consistency across replicas.
#   * HTTP cache + ETag headers under round-robin load balancing.
#   * Graceful drain on `docker compose stop <svc>` under traffic.
#   * Health-check-driven LB removal (nginx ignores upstreams whose
#     /health is failing).

version: "3.8"

services:
  curriculum:
    deploy:
      replicas: 3
    environment:
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT: "60"
      RATE_LIMIT_WINDOW: "60"
    ports: []  # no host port; the LB exposes it
    depends_on:
      - redis

  orchestrator:
    deploy:
      replicas: 2
    environment:
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT: "120"
      RATE_LIMIT_WINDOW: "60"
    ports: []
    depends_on:
      - redis
      - curriculum

  memory:
    environment:
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT: "120"

  identity:
    environment:
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT: "120"

  edge-lb:
    image: nginx:1.27-alpine
    depends_on:
      - curriculum
      - orchestrator
    ports:
      - "18000:8000"   # orchestrator behind LB
      - "18500:8500"   # curriculum behind LB
    volumes:
      - ./nginx-edge.conf:/etc/nginx/nginx.conf:ro
