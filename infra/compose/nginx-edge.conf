worker_processes auto;
events { worker_connections 1024; }

http {
    # Round-robin load balancing onto every replica resolved by the docker
    # internal DNS. `resolve` makes nginx re-resolve the upstream every
    # 10s so newly-scaled replicas get traffic without a reload.
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream curriculum_pool {
        # docker compose --scale curriculum=N adds N IPs behind this DNS
        # name. nginx picks the next replica each request and short-circuits
        # any backend that fails its /health probe (passive health check).
        zone curriculum 64k;
        server curriculum:8500 max_fails=3 fail_timeout=5s;
        keepalive 64;
    }
    upstream orchestrator_pool {
        zone orchestrator 64k;
        server orchestrator:8000 max_fails=3 fail_timeout=5s;
        keepalive 64;
    }

    # Edge-level rate limit (defence in depth; aoep_shared.ratelimit is
    # the per-replica fast path and stays in front of bad actors even when
    # this is generous).
    limit_req_zone $binary_remote_addr zone=api_rps:10m rate=200r/s;
    limit_conn_zone $binary_remote_addr zone=api_conn:10m;

    # Standard log + tracing so we can see which upstream served a request.
    log_format edge '$remote_addr - "$request" $status '
                    'upstream=$upstream_addr ut=$upstream_response_time '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log edge;

    server {
        listen 8500;
        location / {
            limit_req zone=api_rps burst=400 nodelay;
            limit_conn api_conn 100;
            proxy_pass http://curriculum_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_next_upstream   error timeout http_502 http_503 http_504;
        }
    }
    server {
        listen 8000;
        location / {
            limit_req zone=api_rps burst=400 nodelay;
            limit_conn api_conn 100;
            proxy_pass http://orchestrator_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_next_upstream   error timeout http_502 http_503 http_504;
        }
    }
}
