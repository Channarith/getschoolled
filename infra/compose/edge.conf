# Single-origin edge gateway for the docker-compose stack.
#
# Why: the web app and every backend service share ONE public origin (the
# host/IP this listens on). The browser bundle reaches each backend through a
# same-origin path prefix (see apps/web/app/lib/api.ts): /orchestrator/...,
# /identity/..., /curriculum/..., etc. This gateway strips the prefix and
# forwards to the matching service, and serves everything else (the Next.js web
# app) from "/". That means account creation, login, the catalog, live class,
# and all other API calls work over a bare IP or any domain with NO per-host
# build args and NO DNS for separate api/app subdomains.
#
# Mount at /etc/nginx/nginx.conf and publish port 80. (For separate
# curriculum/orchestrator load-balancing across --scale replicas, nginx-edge.conf
# remains available; this gateway re-resolves compose DNS every 10s so scaled
# replicas still receive traffic.)

worker_processes auto;
events { worker_connections 1024; }

http {
    # Docker's embedded DNS; `valid=10s` re-resolves so scaled replicas get traffic.
    resolver 127.0.0.11 valid=10s ipv6=off;

    limit_req_zone $binary_remote_addr zone=edge_rps:10m rate=200r/s;
    limit_conn_zone $binary_remote_addr zone=edge_conn:10m;

    log_format edge '$remote_addr "$request" $status -> $upstream_addr rt=$request_time';
    access_log /var/log/nginx/access.log edge;

    # WebSocket upgrade passthrough (Next.js HMR in dev, SSE, LiveKit signaling).
    map $http_upgrade $conn_upgrade { default upgrade; '' close; }

    # Common proxy settings inherited by every location below.
    proxy_http_version 1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header Upgrade            $http_upgrade;
    proxy_set_header Connection         $conn_upgrade;
    proxy_connect_timeout 5s;
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_next_upstream   error timeout http_502 http_503 http_504;

    server {
        listen 80;
        client_max_body_size 32m;
        limit_req zone=edge_rps burst=400 nodelay;
        limit_conn edge_conn 200;

        # ---- Backend APIs: /<svc>/<path> -> http://<svc>:8000/<path> ----
        # Each backend service listens on container port 8000.
        location ~ ^/orchestrator(?:/(.*))?$ {
            set $up orchestrator; rewrite ^/orchestrator/?(.*)$ /$1 break;
            proxy_pass http://$up:8000;
        }
        location ~ ^/identity(?:/(.*))?$ {
            set $up identity; rewrite ^/identity/?(.*)$ /$1 break;
            proxy_pass http://$up:8000;
        }
        location ~ ^/curriculum(?:/(.*))?$ {
            set $up curriculum; rewrite ^/curriculum/?(.*)$ /$1 break;
            proxy_pass http://$up:8000;
        }
        location ~ ^/integrations(?:/(.*))?$ {
            set $up integrations; rewrite ^/integrations/?(.*)$ /$1 break;
            proxy_pass http://$up:8000;
        }
        location ~ ^/memory(?:/(.*))?$ {
            set $up memory; rewrite ^/memory/?(.*)$ /$1 break;
            proxy_pass http://$up:8000;
        }
        location ~ ^/speech(?:/(.*))?$ {
            set $up speech; rewrite ^/speech/?(.*)$ /$1 break;
            proxy_pass http://$up:8000;
        }
        location ~ ^/billing(?:/(.*))?$ {
            set $up billing; rewrite ^/billing/?(.*)$ /$1 break;
            proxy_pass http://$up:8000;
        }
        location ~ ^/perception(?:/(.*))?$ {
            set $up perception; rewrite ^/perception/?(.*)$ /$1 break;
            proxy_pass http://$up:8000;
        }

        # ---- Everything else: the Next.js web app ----
        location / {
            set $up web;
            proxy_pass http://$up:3000;
        }
    }
}
