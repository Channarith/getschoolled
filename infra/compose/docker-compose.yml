# Local full-stack development compose for the Agentic Online Education Platform.
# Validate with: docker compose -f infra/compose/docker-compose.yml config
# (or `make compose-config`). Cloud uses infra/k8s with the same images/env.

version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: edu
      POSTGRES_PASSWORD: edu
      POSTGRES_DB: edu
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ../../db/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    # Durable: identity snapshots its state here, so persist to a bind mount and
    # use volatile-lru so the no-TTL identity key is never evicted. Mirrors prod
    # (infra/k8s/redis.yaml). Without this, a `docker compose down` wiped accounts
    # /points and re-popped the onboarding survey on the next `up`.
    command:
      - redis-server
      - --dir
      - /data
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "900 1 300 10 60 10000"
      - --maxmemory-policy
      - volatile-lru
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data

  livekit:
    image: livekit/livekit-server:latest
    command: --dev
    ports:
      - "7880:7880"
      - "7881:7881"

  orchestrator:
    build:
      context: ../..
      dockerfile: services/orchestrator/Dockerfile
    env_file:
      - ../../config/local.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  memory:
    build:
      context: ../..
      dockerfile: services/memory/Dockerfile
    env_file:
      - ../../config/local.env
    ports:
      - "8004:8000"
    depends_on:
      - postgres

  speech:
    build:
      context: ../..
      dockerfile: services/speech/Dockerfile
    env_file:
      - ../../config/local.env
    ports:
      - "8002:8000"

  perception:
    build:
      context: ../..
      dockerfile: services/perception/Dockerfile
    env_file:
      - ../../config/local.env
    ports:
      - "8003:8000"

  curriculum:
    build:
      context: ../..
      dockerfile: services/curriculum/Dockerfile
    env_file:
      - ../../config/local.env
    environment:
      # Careers: pull REAL openings from public boards (Remotive + Arbeitnow; no
      # key, falls back to the curated board if the host has no internet). Add
      # RAPIDAPI_KEY / ADZUNA_APP_ID+ADZUNA_APP_KEY to index LinkedIn/Indeed too.
      JOBS_LIVE: "1"
    ports:
      - "8005:8000"

  billing:
    build:
      context: ../..
      dockerfile: services/billing/Dockerfile
    env_file:
      - ../../config/local.env
    ports:
      - "8006:8000"

  identity:
    build:
      context: ../..
      dockerfile: services/identity/Dockerfile
    env_file:
      - ../../config/local.env
    ports:
      - "8008:8000"

  integrations:
    build:
      context: ../..
      dockerfile: services/integrations/Dockerfile
    env_file:
      - ../../config/local.env
    ports:
      - "8007:8000"

  harvester:
    build:
      context: ../..
      dockerfile: services/harvester/Dockerfile
    env_file:
      - ../../config/local.env
    volumes:
      - ./data/harvester:/var/harvester
    depends_on:
      - curriculum

  agent-runtime:
    build:
      context: ../..
      dockerfile: apps/agent-runtime/Dockerfile
    env_file:
      - ../../config/local.env
    depends_on:
      - livekit
      - orchestrator

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        # Falls back to the repo VERSION file inside the Dockerfile when unset.
        APP_VERSION: ${APP_VERSION:-}
    # No NEXT_PUBLIC_*_URL needed: the browser bundle derives backend URLs from
    # the page origin and same-origin path prefixes (see apps/web/app/lib/api.ts),
    # which the `edge` gateway rewrites to each service. Port 3000 stays exposed
    # for direct debugging; real traffic comes through `edge` on port 80.
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator

  # Single public origin: serves the web app and routes /<svc>/... to each
  # backend so account creation, login, catalog, and live class all work over a
  # bare IP or any domain. This is the container to publish on port 80/443.
  edge:
    image: nginx:1.27-alpine
    volumes:
      - ./edge.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web
      - orchestrator
      - identity
      - curriculum
      - integrations
      - memory
      - speech
      - billing
      - perception
