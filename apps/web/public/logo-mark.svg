<?xml version="1.0" encoding="UTF-8"?>
<!--
  Salarean - canonical brand mark.

  Capital S inside a thin circular seal, crowned by a Bodhi-leaf
  silhouette. The Bodhi (peepal / Ficus religiosa) is the tree under
  which the Buddha attained enlightenment - the universal SE Asian
  symbol of learning and wisdom. Salarean derives from the Khmer word
  for school (sala-rean), so a Bodhi-leaf-crowned S reads in two ways
  at once: letter-as-monogram + leaf-as-wisdom-emblem.

  Single ink, themable via currentColor. Works at favicon size,
  prints cleanly in 1-bit.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img"
     aria-label="Salarean">
  <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="128" cy="128" r="106" stroke-width="11"/>
    <path d="M 174 96
             C 174 80, 154 70, 128 70
             C 102 70, 86 82, 86 100
             C 86 118, 108 124, 128 130
             C 148 136, 170 142, 170 162
             C 170 180, 152 192, 128 192
             C 106 192, 88 184, 84 172"
          stroke-width="22"/>
  </g>
  <g fill="currentColor">
    <path d="M 128 30
             C 116 38, 108 50, 110 60
             C 112 68, 122 70, 128 64
             C 134 70, 144 68, 146 60
             C 148 50, 140 38, 128 30 Z"/>
  </g>
</svg>
