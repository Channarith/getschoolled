# Track A.2/A.3 - model size ladder + distributed pretraining config.
# Run the small rungs first (scaling-laws proxy) to pick the compute-optimal
# (Chinchilla) token/param point before committing the full run.

framework: megatron        # megatron | nemo | deepspeed | fsdp
precision: bf16
parallelism:
  tensor: 8
  pipeline: 1
  data: auto
checkpoint:
  interval_steps: 1000
  keep_last: 5
  dir: ${CHECKPOINT_DIR}    # object store

ladder:
  - name: proxy-1b
    params: 1_000_000_000
    layers: 24
    hidden: 2048
    heads: 16
    tokens: 20_000_000_000      # ~20x params (Chinchilla-ish) for the proxy
  - name: mid-8b
    params: 8_000_000_000
    layers: 32
    hidden: 4096
    heads: 32
    tokens: 160_000_000_000
  - name: target
    params: ${TARGET_PARAMS}
    tokens: ${TARGET_TOKENS}

optim:
  lr: 0.0003
  warmup_steps: 2000
  scheduler: cosine
  global_batch_tokens: 4_000_000
