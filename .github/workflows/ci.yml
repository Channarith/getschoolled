name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Test shared (factory: local vs cloud)
        run: cd packages/shared && python -m pytest -q
      - name: Test agent-runtime
        run: cd apps/agent-runtime && python -m pytest -q
      - name: Test services
        run: |
          for s in orchestrator memory speech perception curriculum billing; do
            echo "== $s =="
            (cd services/$s && python -m pytest -q)
          done

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install
        run: cd apps/web && pnpm install --frozen-lockfile
      - name: Typecheck + lint
        run: cd apps/web && pnpm run typecheck && pnpm run lint
      - name: Build
        run: cd apps/web && pnpm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose
        run: docker compose -f infra/compose/docker-compose.yml config >/dev/null
