name: Auto Push Build

# Auto-pushes build changes (build manifest refresh) back to the repo after a
# fresh build. VERSION is bumped in each PR before merge (see scripts/bump_pr_version.py);
# this workflow only refreshes build-info.txt and syncs web version metadata.
# The auto-commit carries [skip ci] and is made with GITHUB_TOKEN, so it never
# retriggers this workflow (no infinite loop).
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-push-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Fresh web build (no cache)
        run: |
          if [ -f apps/web/package.json ]; then
            echo "Building apps/web (fresh, no cache)"
            cd apps/web
            pnpm install --frozen-lockfile || pnpm install
            pnpm run build
          else
            echo "apps/web not present yet; skipping web build"
          fi

      - name: Fresh mobile build (no cache)
        run: |
          if [ -f apps/mobile/package.json ]; then
            echo "Building apps/mobile (fresh, no cache)"
            cd apps/mobile
            # apps/mobile is a pnpm project (pnpm-lock.yaml). `npm ci` fails here
            # because there is no package-lock.json - use pnpm like apps/web.
            pnpm install --frozen-lockfile || pnpm install
            pnpm run typecheck
            pnpm run build
            # The native Android (gradle) build needs the Android SDK + network to
            # Maven/Gradle plugin repos; keep it best-effort so a flaky APK build
            # never blocks the version-bump auto-push.
            pnpm run native:build:android || echo "::warning::native Android build failed; continuing auto-push"
          else
            echo "apps/mobile not present yet; skipping mobile build"
          fi

      - name: Fresh python build (no cache)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install --no-cache-dir -r requirements-dev.txt || true
          fi
          if [ -f packages/shared/pyproject.toml ]; then
            pip install --no-cache-dir -e "packages/shared[harvest]" || true
          fi

      - name: Generate build changes
        run: python3 scripts/build_release.py --refresh-only

      - name: Commit and push build changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          paths="VERSION CHANGELOG.txt build-info.txt apps/web/app/lib/version.ts apps/web/package.json"
          if git diff --quiet -- $paths; then
            echo "No build changes to push."
            exit 0
          fi
          version_str="$(cat VERSION)"
          git add $paths
          git commit -m "build: auto-push build changes for v${version_str} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "Pushed build changes for v${version_str} to ${GITHUB_REF_NAME}"
