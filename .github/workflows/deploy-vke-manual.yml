# Manual VKE deploy for identity + web (QA login / UI fixes).
# No skip conditions — always runs when you click "Run workflow".
# Web Docker build context is repo root (Dockerfile COPY apps/web/...).
name: Deploy VKE (identity + web)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: commit SHA)"
        required: false
        default: ""
      include_web:
        description: "Also build and roll web (uncheck for identity-only QA fix)"
        type: boolean
        required: false
        default: true

env:
  REGISTRY: ${{ vars.REGISTRY || 'sjc.vultrcr.com/salareen' }}

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      services: ${{ steps.mk.outputs.services }}
    steps:
      - id: mk
        run: |
          if [ "${{ inputs.include_web }}" = "true" ]; then
            MATRIX='[{"name":"identity","dockerfile":"services/identity/Dockerfile","context":"."},{"name":"web","dockerfile":"apps/web/Dockerfile","context":"."}]'
            SVCS="identity web"
          else
            MATRIX='[{"name":"identity","dockerfile":"services/identity/Dockerfile","context":"."}]'
            SVCS="identity"
          fi
          echo "matrix={\"include\":${MATRIX}}" >> "$GITHUB_OUTPUT"
          echo "services=${SVCS}" >> "$GITHUB_OUTPUT"

  build-push:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Vultr Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.VULTR_REGISTRY_USERNAME }}
          password: ${{ secrets.VULTR_REGISTRY_PASSWORD }}
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.sha }}" >> "$GITHUB_OUTPUT"
      - name: Build + push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ matrix.name }}:${{ steps.tag.outputs.tag }}

  roll:
    needs: [setup-matrix, build-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Roll deployments
        env:
          TAG: ${{ github.event.inputs.tag || github.sha }}
          SVCS: ${{ needs.setup-matrix.outputs.services }}
        run: |
          set -euo pipefail
          for svc in $SVCS; do
            kubectl -n aoep set image "deployment/$svc" "$svc=${REGISTRY}/$svc:${TAG}" --record
            kubectl -n aoep rollout status "deployment/$svc" --timeout=300s
          done
          echo "Deployed: $SVCS at ${REGISTRY}/*:${TAG}"
